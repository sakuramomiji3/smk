<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC PROJECT | TEAM SMK</title>
<link rel="icon" href="smk.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', "Hiragino Sans", "Meiryo", sans-serif;
    background: linear-gradient(135deg, #eaf3ff, #fdfbff);
    color: #2d3436;
}

/* ヘッダー */
header {
    text-align: center;
    padding: 80px 20px 30px;
}

header h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    margin: 0;
    font-weight: 900;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, #6e8efb, #56ab2f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* コンテナ */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 20px 80px;
}

/* ガラスカード */
.card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 30px;
    padding: 35px;
    margin-bottom: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* ラベル */
.label {
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 20px;
    color: #2d3436;
}

/* 値 */
.value {
    background: rgba(255,255,255,0.8);
    padding: 12px;
    border-radius: 15px;
    font-size: 1.1rem;
    margin-bottom: 10px;
}

/* コピー */
.copy-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #6e8efb, #4a6cf7);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.copy-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(110,142,251,0.3);
}

/* 戻るボタン */
.back-btn {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 35px;
    border-radius: 50px;
    text-decoration: none;
    background: white;
    color: #2d3436;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.back-btn:hover {
    transform: translateY(-5px);
}

/* ポート横並び */
.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

@media (max-width: 700px){
    .row {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>MINECRAFT SERVER</h1>
</header>

<div class="container">

    <!-- Java -->
    <div class="card">
        <div class="label">JAVA EDITION</div>
        <div class="value" id="java">sm-je.f5.si</div>
        <button class="copy-btn" onclick="copyText('java')">アドレスをコピー</button>
    </div>

    <!-- BE -->
    <div class="card">
        <div class="label">BEDROCK EDITION</div>

        <div class="row">
            <div>
                <div class="value" id="be">sm-be.f5.si</div>
                <button class="copy-btn" onclick="copyText('be')">アドレスコピー</button>
            </div>

            <div>
                <div class="value" id="port">18678</div>
                <button class="copy-btn" onclick="copyText('port')">ポートコピー</button>
            </div>
        </div>
    </div>

    <div style="text-align:center;">
        <a href="index.html" class="back-btn">← HOMEに戻る</a>
    </div>

</div>

<script>
function copyText(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
