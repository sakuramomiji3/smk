<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM SMK | 公式サイト</title>
    <link rel="icon" href="smk.png" type="image/png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', "Hiragino Sans", "Meiryo", sans-serif;
            background: linear-gradient(135deg, #eaf3ff, #fdfbff);
            color: #2d3436;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        header::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(110,142,251,0.4), transparent);
            filter: blur(100px);
            z-index: -1;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 0.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 0.15em;
            color: #636e72;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .section {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            text-align: center;
            transition: 0.4s;
        }

        .section:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.12);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            margin: 15px auto;
            border-radius: 2px;
        }

        .intro-section-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 20px 50px;
            background: linear-gradient(135deg, #6e8efb, #4a6cf7);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(110, 142, 251, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .intro-section-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(110, 142, 251, 0.4);
        }

        .sns-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .sns-btn {
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .twitter { background: linear-gradient(135deg, #111, #555); }
        .youtube { background: linear-gradient(135deg, #ff0000, #ff6a6a); }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        /* 👇アクセスカウンター */
        #counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 18px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 999;
        }
    </style>
</head>

<body>

<header>
    <img src="smk.png" class="logo">
    <h1>TEAM SMK</h1>
    <p>CREATE OUR OWN VIBES</p>
</header>

<div class="container">

    <section class="section">
        <h2>わたしたちについて</h2>
        <p>「チームSMK」は、地元の友達5人で結成された運営チームです。</p>
    </section>

    <section class="section">
        <h2>MEMBER INTRODUCTION</h2>
        <a href="introduction.html" class="intro-section-btn">全員の自己紹介を見る</a>
    </section>

    <section class="section">
        <h2>FOLLOW US</h2>
        <div class="sns-buttons">
            <a class="sns-btn twitter">X (Twitter)</a>
            <a class="sns-btn youtube">YouTube</a>
        </div>
    </section>

</div>

<footer>&copy; SMK Team Official 2026</footer>

<!-- 🔥アクセスカウント -->
<div id="counter">総アクセス数: 読み込み中...</div>

<script>
fetch("https://api.countapi.xyz/hit/smk-team/main")
.then(res => res.json())
.then(data => {
    document.getElementById("counter").innerText =
        "総アクセス数: " + data.value;
})
.catch(() => {
    document.getElementById("counter").innerText =
        "総アクセス数: エラー";
});
</script>

</body>
</html>
