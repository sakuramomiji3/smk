<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM SMK | 公式サイト</title>
    <link rel="icon" href="smk.png" type="image/png">
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: #f0f8ff;
            color: #2d3436;
        }
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        header h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 0.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #6e8efb, #a7a7af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 0.1em;
            color: #636e72;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }
        .section {
            background: #ffffff;
            padding: 50px;
            border-radius: 30px;
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        h2 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: #6e8efb;
            margin: 15px auto;
            border-radius: 2px;
        }
        .intro-section-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 20px 50px;
            background: linear-gradient(135deg, #6e8efb, #4a6cf7);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(110, 142, 251, 0.3);
            transition: all 0.3s ease;
        }
        .intro-section-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(110, 142, 251, 0.4);
        }
        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>

<header>
    <img src="smk.png" alt="SMK Logo" class="logo">
    <h1>TEAM SMK</h1>
    <p>CREATE OUR OWN VIBES</p>
</header>

<div class="container">

    <section class="section">
        <h2>わたしたちについて</h2>
        <p style="max-width: 700px; margin: 0 auto;">
            「チームSMK」は、地元の友達5人で結成された運営・管理チームです。<br>
            SNSからシステムまで自分たちで整え、常に新しい「おもしろい」を企画し続けています。
        </p>
    </section>

    <section class="section">
        <h2>MEMBER INTRODUCTION</h2>
        <a href="introduction.html" class="intro-section-btn">
            全員の自己紹介を見る
        </a>
    </section>

    <!-- ★ここをマイクラ用に変更 -->
    <section class="section">
        <h2>MINECRAFT PROJECT</h2>
        <p style="margin-bottom: 30px; color: #636e72;">
            TEAM SMKのマイクラ活動・企画・ワールド紹介はこちら
        </p>
        <a href="mc.html" class="intro-section-btn">
            マイクラページを見る
        </a>
    </section>

</div>

<footer>&copy; SMK Team Official 2026</footer>

</body>
</html>
