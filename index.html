<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM SMK | 公式サイト</title>
    <link rel="icon" href="smk.png" type="image/png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', "Hiragino Sans", "Meiryo", sans-serif;
            background: linear-gradient(135deg, #eaf3ff, #fdfbff);
            color: #2d3436;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        header::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(110,142,251,0.4), transparent);
            filter: blur(100px);
            z-index: -1;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 0.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 0.15em;
            color: #636e72;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .section {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            text-align: center;
            transition: 0.4s;
        }

        .section:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.12);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            margin: 15px auto;
            border-radius: 2px;
        }

        .intro-section-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 20px 50px;
            background: linear-gradient(135deg, #6e8efb, #4a6cf7);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(110, 142, 251, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .intro-section-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(110, 142, 251, 0.4);
        }

        .intro-section-btn::after {
            content: "";
            position: absolute;
            width: 0;
            height: 100%;
            left: 0;
            top: 0;
            background: rgba(255,255,255,0.2);
            transition: 0.4s;
        }

        .intro-section-btn:hover::after {
            width: 100%;
        }

        .sns-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .sns-btn {
            position: relative;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            letter-spacing: 0.1em;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .twitter {
            background: linear-gradient(135deg, #111, #555);
        }

        .youtube {
            background: linear-gradient(135deg, #ff0000, #ff6a6a);
        }

        .discord {
            background: linear-gradient(135deg, #5865F2, #8ea1ff);
        }

        .sns-btn:hover {
            transform: translateY(-6px) scale(1.07);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .sns-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-25deg);
        }

        .sns-btn:hover::before {
            animation: shine 0.8s ease;
        }

        @keyframes shine {
            0% { left: -75%; }
            100% { left: 125%; }
        }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        body {
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px 60px;
            }

            .section {
                padding: 30px 20px;
                border-radius: 20px;
            }

            header {
                height: 50vh;
            }

            header p {
                font-size: 1rem;
            }

            .logo {
                width: 90px;
                height: 90px;
            }

            .intro-section-btn {
                padding: 16px 30px;
                font-size: 1rem;
            }

            .sns-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .sns-btn {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            header {
                height: 45vh;
            }

            header h1 {
                font-size: 2.2rem;
            }

            .section {
                padding: 25px 15px;
            }

            h2 {
                font-size: 1.5rem;
            }

            .intro-section-btn {
                width: 100%;
                padding: 14px 20px;
            }
        }

    </style>
</head>

<body>

<header>
    <img src="smk.png" alt="SMK Logo" class="logo">
    <h1>TEAM SMK</h1>
    <p>CREATE OUR OWN VIBES</p>
</header>

<div class="container">

    <section class="section">
        <h2>わたしたちについて</h2>
        <p style="max-width: 700px; margin: 0 auto;">
            「チームSMK」は、地元の友達5人で結成された運営・管理チームです。<br>
            SNSからシステムまで自分たちで整え、常に新しい「おもしろい」を企画し続けています。
        </p>
    </section>

    <section class="section">
        <h2>MEMBER INTRODUCTION</h2>
        <a href="introduction.html" class="intro-section-btn">
            全員の自己紹介を見る
        </a>
    </section>

    <section class="section">
        <h2>MINECRAFT PROJECT</h2>
        <p style="margin-bottom: 30px; color: #636e72;">
            TEAM SMKのマイクラ活動・企画・ワールド紹介はこちら
        </p>
        <a href="mc.html" class="intro-section-btn">
            マイクラページを見る
        </a>
    </section>

    <section class="section">
        <h2>FOLLOW US</h2>
        <div class="sns-buttons">
            <a href="https://twitter.com/あなたのID" target="_blank" class="sns-btn twitter">X (Twitter)</a>
            <a href="https://www.youtube.com/@あなたのチャンネル" target="_blank" class="sns-btn youtube">YouTube</a>
            <a href="https://discord.gg/あなたの招待リンク" target="_blank" class="sns-btn discord">Discord</a>
        </div>
    </section>

</div>

<footer>&copy; SMK Team Official 2026</footer>

</body>
</html>
